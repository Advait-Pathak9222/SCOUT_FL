# =====================================================================
# Main campaign config — the full IEEE-style bake-off (CIFAR-10 main track).
# Run target = 150 rounds, N=100 clients, K/N=10% (budget=10), 3 seeds.
# Proposed methods (SCOUT-FL v1, SCOUT-FL v2, JEDI-FL) + 13 baselines.
#
# GPU (auto-detected device='auto' -> cuda|mps|cpu):
#   bash scripts/run_macos.sh     scout_fl/configs/campaign_main.yaml     # Apple-silicon MPS
#   bash scripts/run_nvidia.sh    scout_fl/configs/campaign_main.yaml     # NVIDIA CUDA
# CPU smoke (tiny, proves end-to-end):
#   python -m scout_fl.experiments.run_fl_synthetic --config scout_fl/configs/campaign_main.yaml --quick
#
# Dirichlet-alpha / SNR / target sweeps are driven by --override (see scripts/ and configs/sweeps/).
# =====================================================================

experiment: campaign_main
seed: 0
seeds: [0, 1, 2]                  # >=3 seeds for the statistical module (mean±std, CI, tests)
output_dir: outputs

network:
  num_clients: 100               # N = 100
  budget: 10                     # K/N = 10%
  num_targets: 3
  num_regions: 9
  area_size: [100.0, 100.0]

geometry:
  layout: clustered
  num_clusters: 5
  cluster_spread: 3.0
  bs_position: [50.0, 50.0]
  random_clients: true
  random_targets: true
  source: synthetic              # synthetic | deepmimo | deepsense6g | radarscenes
                                 #   (external -> real client/target positions; synthetic fallback)

channel:
  model: rician
  rician_k_db: 6.0
  pathloss_exponent: 3.0
  reference_distance: 10.0
  snr_ref_db: 20.0
  source: synthetic              # synthetic | deepmimo | deepsense6g | radarscenes
                                 #   (external -> real per-client comm gains; synthetic fallback)

sensing:
  ref_snr_db: 20.0
  ref_distance: 10.0
  pathloss_exponent: 2.0
  rcs_mean: 1.0
  rcs_std: 0.3
  k_range: 1.0
  k_angle: 0.05
  prior_fim: 1.0e-3
  target_weights: [1.0, 1.0, 1.0]

coverage:
  rho: 0.92
  innovation: 0.08
  sensing_range: 18.0
  saturating: exp

objectives:
  alpha_learning: 1.0
  lambda_sense: 1.0
  lambda_coverage: 0.5
  lambda_fairness: 0.3

constraints:
  crb_max: null
  mse_agg_max: 1.0e-3            # AirComp-MSE budget; calibrated to bind in the physical regime
                                 # (MSE ~1e-4 good SNR .. >1e-2 cell-edge) so the gate + dual engage
  latency_max: null
  energy_max: null
  power_budget: null
  infeasible_policy: relax_and_log
  dual_lr: 0.5

aircomp:
  enabled: true
  ota_distortion: true           # AirComp distortion ON for the main campaign
  ota_noise_scale: 0.5
  power: 1.0                      # overridden by physical.tx_power_dbm when physical.enabled
  sigma2: 1.0                     # overridden by thermal noise k*T*F*B when physical.enabled
  bandwidth: 1.0e+6              # Hz (real)
  model_bits: 1.0e+5             # overridden by (#params * bits_per_param) when physical.enabled

# Genuine physical units (no scaling): sigma^2 = kTF*B, P from dBm, real log-distance
# path loss -> P*g/sigma^2 is a true SNR; energy in J, latency in s. See sim/link_budget.py.
physical:
  enabled: true
  carrier_ghz: 3.5               # 5G FR1 mid-band
  noise_figure_db: 7.0
  temperature_k: 290.0
  tx_power_dbm: -15.0           # ~0.03 mW energy-constrained uplink; median SNR ~14 dB with
                                 # a cell-edge tail so AirComp distortion engages; SNR sweep varies this
  bits_per_param: 32            # fp32 model payload
  cycles_per_sample: 1.0e+6     # CPU cycles per local sample (small CNN/MLP)
  sense_power_w: 0.1            # radar sensing power per client
  sense_time_s: 0.01            # sensing dwell time

energy:
  cpu_cycles: 1.0e+7            # overridden by cycles_per_sample*local_samples when physical
  cpu_freq: 1.0e+9             # Hz (1 GHz edge CPU)
  kappa: 1.0e-28              # effective switched capacitance (J/cycle/Hz^2)
  e_sense: 0.1
  t_sense: 0.01

selection:
  # proposed (3) + 22 named baselines (incl. Asaad TWC-25 + DivFL/DELTA/PO-FL/FairEquityFL).
  methods: [jedi, scout_v2, scout_greedy,
            random, ota_fedavg, loss, snr_only,
            comm_only, aircomp_mse_min, sensing_only,
            fedcs, oort, fedgcs, fixed_weighted,
            collabsensefed, ota_fl_iscc, sensing_native,
            fedavg_iscc, fedsgd_iscc, fed_iscc, asaad,
            divfl, delta, po_fl, fair_equity, iscc_air_feel,
            crb_only, fedis]
  use_lazy_greedy: true

fl:
  enabled: true
  dataset: cifar10               # main track; fashion_mnist debug / cifar100 harder via --override
  data_root: data
  download: true
  model: small_cnn
  optimizer: sgd
  non_iid: spatial
  dirichlet_alpha: 0.3           # nominal; sweep {0.1, 0.3, 0.5} via --override
  rounds: 150                    # 150 rounds for all (campaign target)
  local_epochs: 1
  batch_size: 64
  lr: 0.05
  device: auto                   # auto -> cuda | mps | cpu
  probe_batches: 1
  subsample_train: 20000
  subsample_test: 4000

logging:
  save_plots: true
