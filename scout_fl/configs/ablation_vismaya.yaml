# =====================================================================
# VISMAYA-FL ABLATION STUDY — make-or-break synergy experiment.
#
# Purpose: Empirically validate that the Syn_k (joint sensing-learning innovation
# synergy) term contributes beyond Ω_S + Ω_L alone.  Under target mobility
# (process_noise > 0) the three ablation variants lose the sensing-learning
# coupling and are expected to degrade vs the full method.
#
# Expected result for the paper (Figure: VISMAYA ablation under mobility):
#   - CRB / localization: vismaya < vismaya_no_syn < vismaya_sense_only  (lower = better)
#   - Test accuracy:      vismaya ≥ vismaya_no_syn > vismaya_learn_only   (higher = better)
#   - Synergy signal:     vis_synergy_mean grows over rounds for full vismaya
#
# JEDI and SCOUT-v2 are included as competing proposed methods (not baselines) to
# show VISMAYA's non-stationary advantage: JEDI's prior does not inflate with target
# motion so it is expected to degrade at high mobility relative to VISMAYA.
#
#   bash scripts/run_macos.sh  scout_fl/configs/ablation_vismaya.yaml
#   bash scripts/run_nvidia.sh scout_fl/configs/ablation_vismaya.yaml
#   python -m scout_fl.experiments.run_fl_synthetic \
#          --config scout_fl/configs/ablation_vismaya.yaml [--quick]
#
# Resumable: per-round JSON under runs/ablation_vismaya/base/ ; re-run to resume.
# =====================================================================

experiment: ablation_vismaya
seed: 0
seeds: [0, 1, 2]
output_dir: outputs
runs_dir: runs

network:
  num_clients: 100
  budget: 10
  num_targets: 3
  num_regions: 9
  area_size: [100.0, 100.0]

geometry:
  layout: clustered
  num_clusters: 5
  cluster_spread: 3.0
  bs_position: [50.0, 50.0]
  random_clients: true
  random_targets: true
  source: synthetic

channel:
  model: rician
  rician_k_db: 6.0
  pathloss_exponent: 3.0
  reference_distance: 10.0
  snr_ref_db: 20.0
  source: synthetic

sensing:
  ref_snr_db: 20.0
  ref_distance: 10.0
  pathloss_exponent: 2.0
  rcs_mean: 1.0
  rcs_std: 0.3
  k_range: 1.0
  k_angle: 0.05
  prior_fim: 1.0e-3
  target_weights: [1.0, 1.0, 1.0]

coverage:
  rho: 0.92
  innovation: 0.08
  sensing_range: 18.0
  saturating: exp

objectives:
  alpha_learning: 1.0
  lambda_sense: 1.0
  lambda_coverage: 0.5
  lambda_fairness: 0.3
  fair_dual_lr: 1.0

constraints:
  crb_max: null
  mse_agg_max: 0.05
  latency_max: null
  energy_max: null
  power_budget: null
  infeasible_policy: relax_and_log
  dual_lr: 0.5

aircomp:
  enabled: true
  ota_distortion: true
  ota_noise_scale: 0.5
  power: 1.0
  sigma2: 1.0
  bandwidth: 1.0e+6
  model_bits: 1.0e+5

energy:
  cpu_cycles: 1.0e+7
  cpu_freq: 1.0e+9
  kappa: 1.0e-27
  e_sense: 0.1
  t_sense: 0.01

selection:
  # Full VISMAYA + 3 component knockouts + the other two proposed methods.
  # Key comparison: vismaya vs vismaya_no_syn (same Ω_S + Ω_L, no Syn).
  # If Syn matters under mobility, the gap should be clear in CRB and test_acc.
  # JEDI and SCOUT-v2 are proposed methods competing in the same bake-off — not baselines.
  methods: [vismaya,
            vismaya_no_syn,
            vismaya_sense_only,
            vismaya_learn_only,
            jedi,
            scout_v2]
  use_lazy_greedy: false

# VISMAYA config — NON-STATIONARY (mobility) mode.
# process_noise = 0.05 inflates each target's state covariance P_m by 0.05*I per round,
# modelling gradual target motion (~1-2 m/s at the default geometry scale).
# This is the regime where Syn_k grows: clients whose sensing echo AND gradient norm
# both surprise the server's generative model receive a selection bonus — the synergy
# term detects that a target has moved AND driven a local data distribution shift.
vismaya:
  rho_v: 1.0          # auto-calibrated on first round
  beta: 0.3           # synergy weight; ablation variants override to 0.0
  process_noise: 0.05 # NON-ZERO: active target mobility (key setting for the ablation)
  ema_alpha: 0.1

fl:
  enabled: true
  dataset: cifar10
  data_root: data
  download: true
  model: small_cnn
  optimizer: sgd
  non_iid: spatial            # spatial non-IID is ESSENTIAL: sensing-learning coupling
  dirichlet_alpha: 0.3        # moderate heterogeneity (cross-target data variation)
  rounds: 50                  # enough to observe synergy growth + performance divergence
  local_epochs: 1
  batch_size: 64
  lr: 0.05
  device: auto
  probe_batches: 1
  subsample_train: 20000
  subsample_test: 4000

logging:
  save_plots: true
