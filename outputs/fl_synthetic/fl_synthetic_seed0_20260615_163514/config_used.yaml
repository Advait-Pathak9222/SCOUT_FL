experiment: fl_synthetic_small
seed: 0
output_dir: outputs
network:
  num_clients: 10
  budget: 3
  num_targets: 3
  num_regions: 9
  area_size:
  - 100.0
  - 100.0
geometry:
  bs_position:
  - 50.0
  - 50.0
  random_clients: true
  random_targets: true
channel:
  model: rician
  rician_k_db: 6.0
  pathloss_exponent: 3.0
  reference_distance: 10.0
  snr_ref_db: 20.0
sensing:
  ref_snr_db: 20.0
  ref_distance: 10.0
  pathloss_exponent: 2.0
  rcs_mean: 1.0
  rcs_std: 0.3
  k_range: 1.0
  k_angle: 0.05
  prior_fim: 0.001
  target_weights:
  - 1.0
  - 1.0
  - 1.0
coverage:
  rho: 0.92
  innovation: 0.08
  sensing_range: 18.0
  saturating: exp
objectives:
  alpha_learning: 1.0
  lambda_sense: 1.0
  lambda_coverage: 0.5
  lambda_fairness: 0.3
constraints:
  crb_max: null
  mse_agg_max: 0.05
  latency_max: null
  energy_max: null
  power_budget: null
  infeasible_policy: relax_and_log
aircomp:
  enabled: true
  ota_distortion: false
  ota_noise_scale: 0.5
  power: 1.0
  sigma2: 1.0
  bandwidth: 1000000.0
  model_bits: 100000.0
energy:
  cpu_cycles: 10000000.0
  cpu_freq: 1000000000.0
  kappa: 1.0e-27
  e_sense: 0.1
  t_sense: 0.01
selection:
  methods:
  - scout_greedy
  - random
  - loss
  - snr_only
  use_lazy_greedy: true
fl:
  enabled: true
  dataset: mnist
  data_root: data
  download: true
  model: mlp
  optimizer: sgd
  non_iid: dirichlet
  dirichlet_alpha: 0.3
  rounds: 3
  local_epochs: 1
  batch_size: 64
  lr: 0.05
  device: cpu
  probe_batches: 1
  subsample_train: 2000
  subsample_test: 1000
logging:
  save_plots: true
